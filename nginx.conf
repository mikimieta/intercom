# Main NGINX configuration file

# User and worker process settings
user  nginx;
worker_processes  1;

# The \"events\" block is necessary for NGINX to handle connections
events {
    worker_connections 1024;
}

# The \"http\" block contains server definitions and settings
http {
    # Basic NGINX HTTP settings
    include       mime.types;
    default_type  application/octet-stream;

    # SSL-related settings (optional but recommended)
    ssl_prefer_server_ciphers on;

    # Server block for HTTP (port 80)
    server {
        listen 80;
        server_name 192.168.2.106;

        # Redirect all HTTP traffic to HTTPS
        location / {
            return 301 https://\$host\$request_uri;
        }
    }

    # Server block for HTTPS (port 443)
    server {
        listen 443 ssl;
        server_name 192.168.2.106;

        # SSL Certificate and Key
        ssl_certificate /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        # SSL Settings (simplified and compatible)
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'HIGH:!aNULL:!MD5';

        # Enable HTTP Strict Transport Security (HSTS) for added security
        # add_header Strict-Transport-Security \"max-age=31536000; includeSubDomains; preload\" always;

        # Location for proxying to backend service
        location / {
            proxy_pass http://172.27.0.4:8080;  # Ensure this IP is accessible from NGINX
            proxy_set_header Host \$host;
            proxy_set_header X-Real-IP \$remote_addr;
            proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto \$scheme;
        }

        # This location block will handle requests on port 9000
        location /api/v1/ {
            proxy_pass http://172.27.0.3:8000;  # New backend for /9000 requests
            proxy_set_header Host \$host;
            proxy_set_header X-Real-IP \$remote_addr;
            proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto \$scheme;
        }

        # New location block for /manager (without passing /manager in the URL)
        location /manager {
            # Strip the /manager prefix when forwarding to the backend
            rewrite ^/manager(/.*)$ \$1 break;
            proxy_pass http://172.27.0.3:8000;  # Forward to backend without /manager
            proxy_set_header Host \$host;
            proxy_set_header X-Real-IP \$remote_addr;
            proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto \$scheme;
        }
    }
}